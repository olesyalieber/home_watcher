name: Sentosa 4BR Watcher

on:
  schedule:
    # Каждые 30 минут. Время в UTC (GitHub Actions всегда в UTC).
    - cron: "*/30 * * * *"
  workflow_dispatch:   # позволяет запустить вручную кнопкой в интерфейсе GitHub

# Нужны права на запись, чтобы коммитить обновлённый seen_listings.json обратно в репозиторий
permissions:
  contents: write

# Чтобы параллельные запуски не конфликтовали при коммите состояния
concurrency:
  group: sentosa-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Запуск проверки
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_MODE: once
        run: python sentosa_watcher.py

      - name: Сохранить состояние (seen_listings.json) в репозиторий
        run: |
          if [[ -n $(git status --porcelain seen_listings.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen_listings.json
            git commit -m "Update seen listings [skip ci]"
            git push
          else
            echo "Изменений в состоянии нет — коммит не нужен."
          fi
